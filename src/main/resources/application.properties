# ===============================
# DATABASE CONFIGURATION
# ===============================

spring.datasource.url=jdbc:mysql://mysql-21c0f1dd-sanyamkothali2004-1d89.j.aivencloud.com:15231/defaultdb?sslMode=REQUIRED&allowPublicKeyRetrieval=true
spring.datasource.username=avnadmin
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# CONNECTION POOL (Hikari)
# ===============================

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===============================
# JPA / HIBERNATE CONFIG
# ===============================

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ===============================
# SERVER CONFIG
# ===============================

server.port=${PORT:8081}

# ===============================
# FILE UPLOAD CONFIG
# ===============================

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ===============================
# WEB ENCODING
# ===============================

spring.web.resources.add-mappings=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ===============================
# JWT CONFIGURATION
# ===============================

app.jwt.secret=V3N5aW5WbVJzM2Q4eWQ5d0oyMmZwQ3F1U29KaHhlQW50QjQ5NWFxb1BuSA==
app.jwt.expiration-ms=86400000

# ===============================
# LOGGING
# ===============================

logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.level.com.example.attendance_Backend=DEBUG

# ===============================
# EMAIL CONFIGURATION
# ===============================

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000